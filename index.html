<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Umme Dhor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.cdnfonts.com/css/gagalin" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="auth-screen" class="screen active">
      <img src="/logo.png" alt="Umme Dhor Logo" class="app-logo" />
      <h1 id="portal-title">Umme Dhor</h1>
      <p id="portal-subtitle" class="subtitle">Loading portal...</p>

      <div id="setup-pin-box" class="auth-box hidden">
        <h2>Create PIN</h2>
        <p class="helper-text">Create a 4-digit PIN for future access.</p>
        <input id="setup-pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Create 4-digit PIN" />
        <button onclick="submitSetupPin()">Set PIN</button>
      </div>

      <div id="login-pin-box" class="auth-box hidden">
        <h2>Enter PIN</h2>
        <p class="helper-text">Enter your 4-digit PIN to continue.</p>
        <input id="login-pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="Enter 4-digit PIN" />
        <button onclick="submitLogin()">Log In</button>
      </div>

      <p id="auth-error" class="error-message"></p>
    </section>

    <section id="student-home" class="screen student-theme">
      <div class="top-bar">
        <div>
          <h2>Student Home</h2>
          <p id="student-welcome" class="mini-text"></p>
        </div>
        <button class="small-btn" onclick="logout()">Logout</button>
      </div>
      <div class="card-grid">
        <button class="home-card" onclick="openDhorForm()"><span class="card-icon">＋</span><span>Record Dhor</span></button>
        <button class="home-card" onclick="openDhorList()"><span class="card-icon">▤</span><span>My Dhor Progress</span></button>
      </div>
    </section>

    <section id="admin-home" class="screen admin-theme">
      <div class="top-bar">
        <div>
          <h2>Staff Dashboard</h2>
          <p id="admin-welcome" class="mini-text"></p>
        </div>
        <button class="small-btn" onclick="logout()">Logout</button>
      </div>
      <div class="card-grid">
        <button class="home-card" onclick="openDhorList()"><span class="card-icon">▧</span><span>Dhor Progress</span></button>
        <button class="home-card" onclick="openDhorForm()"><span class="card-icon">＋</span><span>Add Dhor Entry</span></button>
      </div>
    </section>

    <section id="dhor-form-screen" class="screen">
      <div class="nav-header">
        <h2 id="dhor-form-title">Record Dhor</h2>
        <button class="small-btn" onclick="logout()">Logout</button>
      </div>

      <div class="dashboard-section form-panel">
        <input id="dhor-id" type="hidden" />

        <label for="dhor-date">Date</label>
        <input id="dhor-date" type="date" />

        <label id="dhor-username-label" for="dhor-username">Student Username</label>
        <input id="dhor-username" type="text" placeholder="Student username" />

        <label for="dhor-portion">Portion</label>
        <select id="dhor-portion"></select>

        <div class="two-col">
          <div>
            <label for="dhor-mistakes">Mistakes</label>
            <input id="dhor-mistakes" type="number" min="0" step="1" placeholder="0" />
          </div>
          <div>
            <label for="dhor-minutes">Minutes</label>
            <input id="dhor-minutes" type="number" min="0" step="1" placeholder="0" />
          </div>
        </div>

        <label for="dhor-comments">Comments</label>
        <textarea id="dhor-comments" rows="4" placeholder="Notes about fluency, mistakes, or revision..."></textarea>

        <label id="dhor-status-label" for="dhor-status">Verify Status</label>
        <select id="dhor-status">
          <option value="Pending">Pending</option>
          <option value="Verified">Verified</option>
          <option value="Needs Review">Needs Review</option>
        </select>

        <button id="save-dhor-btn" onclick="saveDhorEntry()">Save Dhor Entry</button>
        <p id="dhor-sync-status" class="sync-status mini-text"></p>
        <p id="dhor-form-message" class="helper-text"></p>
      </div>
    </section>

    <section id="dhor-list-screen" class="screen">
      <div class="nav-header">
        <h2 id="dhor-list-title">Dhor Progress</h2>
        <button class="small-btn" onclick="goHome()">Back</button>
      </div>

      <div id="admin-filter-box" class="dashboard-section hidden">
        <label for="admin-username-filter">Filter by username</label>
        <div class="filter-row">
          <input id="admin-username-filter" type="text" placeholder="Leave blank for all students" />
          <button class="small-btn" onclick="loadDhorRecords()">Filter</button>
        </div>
      </div>

      <div id="dhor-summary" class="summary-grid"></div>
      <div id="dhor-record-list" class="list-stack"><p class="helper-text">Loading...</p></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
